version: "2"

run:
  modules-download-mode: readonly
  relative-path-mode: cfg
  allow-parallel-runners: true

output:
  formats:
    text:
      path: stdout
      colors: true

linters:
  default: none
  enable:
    - asciicheck
    - dogsled
    - dupl
    - errcheck
    - errorlint
    - exhaustive
    - funlen
    - gochecknoglobals
    - gochecknoinits
    - gocognit
    - goconst
    - gocritic
    - gocyclo
    - goprintffuncname
    - gosec
    - govet
    - ineffassign
    - lll
    - misspell
    - nakedret
    - nestif
    - nlreturn
    - nolintlint
    - prealloc
    - staticcheck
    - unconvert
    - unused
    - whitespace
    - wsl_v5
  settings:
    dupl:
      threshold: 100
    goconst:
      min-len: 2
      min-occurrences: 3
    gocyclo:
      min-complexity: 15
    godot:
      scope: declarations
      capital: true
    govet:
      enable:
        - shadow
    lll:
      line-length: 120
    misspell:
      locale: US
    nolintlint:
      require-specific: true
    prealloc:
      simple: true
      range-loops: true
      for-loops: true
    wsl_v5:
      allow-first-in-block: true
      allow-whole-block: false
      branch-max-lines: 2
  exclusions:
    paths:
      - .github
      - .git
    rules:
      - path: _test\.go
        linters:
          - dupl
          - funlen
          - gocognit

formatters:
  enable:
    - gofmt
    - goimports
  exclusions:
    paths:
      - .github
      - .git
