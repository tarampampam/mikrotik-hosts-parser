version: '3.8'

volumes:
  tmp-data: {}
  redis-data: {}

services:
  app: &app-service
    image: golang:1.26 # Image page: <https://hub.docker.com/_/golang>
    working_dir: /src
    environment:
      HOME: /tmp
      GOPATH: /tmp
    volumes:
      - /etc/passwd:/etc/passwd:ro
      - /etc/group:/etc/group:ro
      - .:/src:rw
      - tmp-data:/tmp:rw
    security_opt: [no-new-privileges:true]

  web:
    <<: *app-service
    ports:
      - '8080:8080/tcp' # Open <http://127.0.0.1:8080>
    command: go run ./cmd/mikrotik-hosts-parser serve --config ./configs/config.yml --resources-dir ./web --caching-engine redis --redis-dsn "redis://redis:6379/0"
    depends_on:
      redis: {condition: service_healthy}

  redis:
    image: redis:7-alpine # Image page: <https://hub.docker.com/_/redis>
    volumes:
      - redis-data:/data:rw
    ports:
      - '6379/tcp'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 500ms
      timeout: 1s
    security_opt: [no-new-privileges:true]
